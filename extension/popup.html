<html>
  <header>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </header>
  <body>
    <div class="extension-container">
      <div class="mb-1">
        <h3 class="m-0">Auto review exercises tool - For Basic classes</h3>
        <div id="btn-group" class="btn-group">
          <button class="primary-btn float-r" id="loginBtn">Login</button>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
      </div>
      <div id="container">
        <textarea
          id="docLinks"
          class="mb-1"
          placeholder="Paste Google Doc links here (one per line)..."
          rows="10"
        ></textarea>
        <button class="mb-1 primary-btn" id="processAllDocs">Process All Documents</button>
      </div>
      <div id="result"></div>
    </div>
    <div class="mb-1" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
