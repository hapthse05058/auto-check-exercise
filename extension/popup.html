<html>
  <header>
    <meta charset="UTF-8" />
  </header>
  <body>
    <div class="container">
      <h3>Student Document List</h3>
      <textarea
        id="docLinks"
        placeholder="Paste Google Doc links here (one per line)..."
        rows="10"
        style="width: 100%"
      ></textarea>
      <button id="processAllDocs">Process All Documents</button>
      <div id="status"></div>
    </div>
    <button id="loginBtn">Login</button>
    <button
      id="logout"
      style="
        margin-left: 10px;
        background-color: #f44336;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
      "
    >
      Logout
    </button>

    <div id="result"></div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
